name: Flask CI Pipline 

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:
  build-and-test:
  
    runs-on : ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Python 
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest -v


       
        


